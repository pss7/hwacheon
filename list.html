<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화천군의회 작업내역</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: #1f2937;
            background: linear-gradient(180deg, #f4f8fd 0%, #eef4fb 100%);
        }

        #wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .topLayout {
            display: grid;
            grid-template-columns: 1.4fr .8fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .heroBox {
            padding: 32px;
            border-radius: 22px;
            background: linear-gradient(135deg, #183b6b 0%, #245ea8 100%);
            color: #ffffff;
            box-shadow: 0 12px 32px rgba(24, 59, 107, 0.08);
        }

        .heroBox h1 {
            margin: 0 0 10px;
            font-size: 34px;
            line-height: 1.2;
            font-weight: 700;
        }

        .heroBox p {
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.82);
        }

        .summaryBox {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .summaryCard {
            padding: 22px 20px;
            border: 1px solid rgba(36, 94, 168, 0.1);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 12px 32px rgba(24, 59, 107, 0.08);
        }

        .summaryCard .label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            color: #6b7280;
        }

        .summaryCard strong {
            display: block;
            font-size: 28px;
            line-height: 1;
            color: #183b6b;
        }

        .contentCard {
            overflow: hidden;
            border: 1px solid rgba(36, 94, 168, 0.12);
            border-radius: 22px;
            background: #ffffff;
            box-shadow: 0 12px 32px rgba(24, 59, 107, 0.08);
        }

        .contentHead {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 22px 26px;
            border-bottom: 1px solid #e9eef5;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
        }

        .contentHead h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
        }

        .filterText {
            flex-shrink: 0;
            padding: 9px 14px;
            border-radius: 999px;
            background: #edf5ff;
            font-size: 13px;
            font-weight: 600;
            color: #245ea8;
        }

        .tableWrap {
            padding: 0 20px 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
            min-width: 720px;
        }

        thead th {
            padding: 0 18px 8px;
            font-size: 13px;
            font-weight: 700;
            color: #6b7280;
            text-align: left;
        }

        tbody tr.itemRow th,
        tbody tr.itemRow td {
            padding: 18px;
            border-top: 1px solid #e9eef5;
            border-bottom: 1px solid #e9eef5;
            background: #ffffff;
        }

        tbody tr.itemRow th {
            border-left: 1px solid #e9eef5;
            border-radius: 14px 0 0 14px;
            font-weight: 600;
            text-align: left;
        }

        tbody tr.itemRow td:last-child {
            border-right: 1px solid #e9eef5;
            border-radius: 0 14px 14px 0;
        }

        tbody tr.itemRow:hover th,
        tbody tr.itemRow:hover td {
            background: #f7fbff;
            border-color: #dbe8f8;
        }

        tr.sectionRow th {
            padding: 16px 10px 6px;
            font-size: 14px;
            font-weight: 700;
            color: #245ea8;
            text-align: left;
            border: 0;
            background: transparent;
        }

        .fileCell {
            text-align: right;
        }

        .fileLink {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 128px;
            padding: 10px 16px;
            border: 1px solid #2f74c8;
            border-radius: 999px;
            background: #ffffff;
            color: #245ea8;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: .2s ease;
        }

        .fileLink:hover {
            background: #2f74c8;
            color: #ffffff;
            transform: translateY(-1px);
        }

        .pageName {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            flex: 0 0 auto;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2f74c8;
        }

        @media (max-width: 900px) {
            .topLayout {
                grid-template-columns: 1fr;
            }

            .heroBox h1 {
                font-size: 28px;
            }
        }

        @media (max-width: 560px) {
            #wrap {
                padding: 24px 14px 40px;
            }

            .heroBox,
            .summaryCard {
                padding: 20px;
            }

            .contentHead {
                flex-direction: column;
                align-items: flex-start;
                padding: 18px 18px 16px;
            }

            .tableWrap {
                padding: 0 12px 14px;
            }

            .summaryBox {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
