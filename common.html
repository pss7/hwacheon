<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="Keywords" content="" />
    <meta name="Description" content="" />
    <meta name="Author" content="" />
    <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>공통</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/common.css">

    <script src="js/jquery-1.12.4.min.js"></script>
    <script src="js/common.js"></script>

    <style>
        body {
            margin: 0;
            background-color: #f5f7fa;
            color: #222;
        }

        #wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 48px 20px 80px;
        }

        .commonHeader {
            margin-bottom: 40px;
        }

        .commonTitle {
            margin: 0;
            color: #111827;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.3;
        }

        .commonDesc {
            margin: 12px 0 0;
            color: #6b7280;
            font-size: 15px;
            line-height: 1.6;
        }

        .commonSection {
            margin-top: 32px;
            padding: 32px;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            background-color: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        .commonSectionTitle {
            margin: 0;
            color: #111827;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
        }

        .commonSectionDesc {
            margin: 10px 0 0;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
        }

        .commonGrid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .commonGrid.full {
            grid-template-columns: 1fr;
        }

        .commonItem {
            padding: 20px;
            border: 1px solid #edf1f5;
            border-radius: 20px;
            background-color: #f9fafb;
        }

        .commonItemTitle {
            margin: 0 0 16px;
            color: #111827;
            font-size: 16px;
            font-weight: 700;
        }

        .commonPreview {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .code {
            margin-top: 24px;
            padding: 16px 18px;
            border-radius: 16px;
            background-color: #111827;
            color: #e5e7eb;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
        }

        @media (max-width: 768px) {

            .commonPage {
                padding: 32px 16px 56px;
            }

            .commonTitle {
                font-size: 28px;
            }

            .commonSection {
                padding: 24px;
                border-radius: 20px;
            }

            .commonSectionTitle {
                font-size: 20px;
            }

            .commonGrid {
                grid-template-columns: 1fr;
            }

            .commonItem {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div id="wrap">

        <header class="commonHeader">
            <h1 class="commonTitle">공통</h1>
        </header>

        <section class="commonSection">
            <h2 class="commonSectionTitle">버튼</h2>
            <div class="commonGrid">
                <div class="commonItem">
                    <h3 class="commonItemTitle">기본 버튼</h3>

                    <div class="commonPreview">

                        <div class="btnBox">
                            <button type="button" class="btn btnSecondary">
                                <div class="slideText">
                                    <span class="slideTextItem slideTextPrimary">버튼</span>
                                    <span class="slideTextItem slideTextClone" aria-hidden="true">버튼</span>
                                </div>
                            </button>

                            <button type="button" class="btn btnPrimary">
                                <div class="slideText">
                                    <span class="slideTextItem slideTextPrimary">버튼</span>
                                    <span class="slideTextItem slideTextClone" aria-hidden="true">버튼</span>
                                </div>
                            </button>
                        </div>

                    </div>
                </div>

                <div class="commonItem">
                    <h3 class="commonItemTitle">등록 / 수정</h3>
                    <div class="commonPreview">

                        <div class="btnBox">
                            <button type="button" class="btn btnPrimary btnPositive">
                                <div class="slideText">
                                    <span class="slideTextItem slideTextPrimary">등록</span>
                                    <span class="slideTextItem slideTextClone" aria-hidden="true">등록</span>
                                </div>
                            </button>

                            <button type="button" class="btn btnPrimary btnPositive">
                                <div class="slideText">
                                    <span class="slideTextItem slideTextPrimary">수정</span>
                                    <span class="slideTextItem slideTextClone" aria-hidden="true">수정</span>
                                </div>
                            </button>
                        </div>

                    </div>
                </div>

                <div class="commonItem">
                    <h3 class="commonItemTitle">삭제 / 취소</h3>
                    <div class="commonPreview">

                        <div class="btnBox">
                            <button type="button" class="btn btnSecondary btnNegative">
                                <div class="slideText">
                                    <span class="slideTextItem slideTextPrimary">삭제</span>
                                    <span class="slideTextItem slideTextClone" aria-hidden="true">삭제</span>
                                </div>
                            </button>

                            <button type="button" class="btn btnSecondary btnNegative">
                                <div class="slideText">
                                    <span class="slideTextItem slideTextPrimary">취소</span>
                                    <span class="slideTextItem slideTextClone" aria-hidden="true">취소</span>
                                </div>
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </section>

        <section class="commonSection">
            <h2 class="commonSectionTitle">게시판-테이블형</h2>
            <div class="commonGrid full">
                <div class="commonItem">
                    <h3 class="commonItemTitle">목록</h3>

                    <div class="commonPreview">

                        <div class="boardListBox">
                            <table class="boardListTable">
                                <caption class="blind">
                                    공지사항 테이블
                                </caption>
                                <colgroup>
                                    <col class="id">
                                    <col class="title">
                                    <col class="author">
                                    <col class="date">
                                </colgroup>
                                <thead>
                                    <tr>
                                        <th scope="col">
                                            번호
                                        </th>
                                        <th scope="col" class="textLeft">
                                            제목
                                        </th>
                                        <th scope="col">
                                            작성자
                                        </th>
                                        <th scope="col">
                                            날짜
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="notice">
                                        <td>
                                            <span class="category" aria-label="공지">
                                                공지
                                            </span>
                                        </td>

                                        <td class="title">
                                            <a href="#" class="link">
                                                <span class="titleText">
                                                    게시글 목록 텍스트입니다. 게시글 목록 텍스트입니다. 게시글 목록 텍스트입니다. 게시글 목록 텍스트입니다.
                                                    게시글 목록 텍스트입니다. 게시글 목록 텍스트입니다.
                                                    게시글
                                                    목록 텍스트입니다.
                                                </span>
                                                <span class="file">
                                                    <img src="../images/sub/file_icon.svg" alt="첨부파일">
                                                </span>
                                            </a>
                                        </td>
                                        <td>
                                            관리자
                                        </td>
                                        <td>
                                            <span class="date">
                                                2024-01-03
                                            </span>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <span class="id">
                                                5
                                            </span>
                                        </td>

                                        <td class="title">
                                            <a href="#" class="link">
                                                <span class="titleText">
                                                    게시글 목록 텍스트입니다.
                                                </span>
                                                <span class="file">
                                                    <img src="../images/sub/file_icon.svg" alt="첨부파일">
                                                </span>
                                            </a>
                                        </td>
                                        <td>
                                            관리자
                                        </td>
                                        <td>
                                            <span class="date">
                                                2024-01-03
                                            </span>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <span class="id">
                                                5
                                            </span>
                                        </td>

                                        <td class="title">
                                            <a href="#" class="link">
                                                <span class="titleText">
                                                    게시글 목록 텍스트입니다.
                                                </span>
                                            </a>
                                        </td>
                                        <td>
                                            관리자
                                        </td>
                                        <td>
                                            <span class="date">
                                                2024-01-03
                                            </span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>
            </div>
        </section>

    </div>
    <!-- //wrap -->

</body>

</html>
