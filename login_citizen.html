<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="Keywords" content="" />

    <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>화천군의회</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/jquery-1.12.4.min.js"></script>
    <script src="js/script.js"></script>

</head>

<body>

    <div id="wrap">

        <!-- 
        의원로그인 > loginMemberWrap
        시민로그인 > loginCitizenWrap
        -->
        <main id="loginWrap" class="loginCitizenWrap">

            <section class="loginBox">

                <div class="loginLogoBox">
                    <h1>
                        <a href="#">
                            <img src="images/common/m_logo.svg" alt="의회 화천군의회 Hwacheon County Council">
                        </a>
                    </h1>
                </div>
                <!-- //loginLogoBox -->

                <div class="loginInputBox">

                    <h2>시민로그인</h2>

                    <div class="inputCheckBox">
                        <input type="checkbox" id="noticeChk" class="blind">
                        <label for="noticeChk" class="checkLabel">
                            <span>
                                휴대폰 본인인증
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="btn btnPrimary btnPositive loginBtn">
                        <div class="slideText">
                            <span class="slideTextItem slideTextPrimary">로그인</span>
                            <span class="slideTextItem slideTextClone" aria-hidden="true">로그인</span>
                        </div>
                    </button>

                </div>
                <!-- //loginInputBox -->

                <div class="loginInfoBox">

                    <div class="loginLinkBox">
                        <a href="index.html" class="loginLink01">메인으로 돌아가기</a>
                    </div>

                </div>
                <!-- //loginInfoBox -->

            </section>
            <!-- //loginBox -->

        </main>
        <!-- main -->

    </div>
    <!-- //wrap -->

</body>
